<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP | Library Project</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>
</head>

<body>

    <button type="button" id="new" command="show-modal" commandfor="add-book-dialog">New Book?</button>

    <div class="books">
    </div>

    <dialog id="add-book-dialog">
        <form action="" method="dialog">
            <h1>Add a book to your collection</h1>
            <p>Please complete all required fields.</p>
            <fieldset>
                <legend>Book Information</legend>
                <label for="title">Book Title</label>
                <input type="text" name="title" id="title">
                <label for="authot">Book Author</label>
                <input type="text" name="author" id="author">
                <label for="pages">How many Pages?</label>
                <input type="number" name="pages" id="pages">
                <label for="read">Have you read the book?</label>
                <input type="checkbox" name="read" id="read">
            </fieldset>
            <button type="submit" id="add">Add book to collection</button>
        </form>
    </dialog>

</body>

</html>

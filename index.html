<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP | Library Project</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>


    <link href="./assets/fonts/inter-v20-latin-regular.woff2" type="font/woff2" rel="preload" as="font" crossorigin>
    <link href="./assets/fonts/inter-v20-latin-600.woff2" type="font/woff2" rel="preload" as="font" crossorigin>
    <link href="./assets/fonts/inter-v20-latin-600italic.woff2" type="font/woff2" rel="preload" as="font" crossorigin>
    <link href="./assets/fonts/instrument-serif-v5-latin-regular.woff2" type="font/woff2" rel="preload" as="font"
        crossorigin>

</head>

<body>

    <main>

        <h1>Your Library</h1>

        <div class="books">
            <div class="shelf">
            </div>
        </div>
        <dialog id="add-book-dialog">
            <form action="" method="dialog">
                <h2>Add a book to your collection</h2>
                <p>Please complete all required (<b>*</b>) fields.</p>
                <fieldset>
                    <legend>Book Information</legend>
                    <label for="title">Book Title</label>
                    <input type="text" name="title" id="title" maxlength="20" required>
                    <label for="author">Book Author</label>
                    <input type="text" name="author" id="author" maxlength="30" required>
                    <label for="pages">How many Pages?</label>
                    <input type="number" name="pages" id="pages" min="1" required>
                    <label for="read">Have you read the book?
                        <input type="checkbox" name="read" id="read">
                    </label>
                </fieldset>
                <button type="submit" id="add">Add book to collection</button>
            </form>
        </dialog>

        <button type="button" id="new" command="show-modal" commandfor="add-book-dialog">New Book?</button>

    </main>


</body>

</html>

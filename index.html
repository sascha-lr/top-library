<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP | Library Project</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>
</head>

<body>

    <main>

        <div class="books">
            <div class="shelf">
                <div class="book">
                    <h2 class="title">Hobbit</h2>
                    <h3 class="author">Tolkien</h3>
                </div>
                <div class="book">
                    <h2 class="title">Vagabond</h2>
                    <h3 class="author">Inoue</h3>
                    <p class="pages">Pages: 835</p>
                    <label for="read-check-box">Read?
                        <input type="checkbox" class="read-check-box">
                    </label>
                    <button class="remove">Remove</button>
                </div>
                <div class="book">
                    <h2 class="title">Atomic Habits</h2>
                    <h3 class="author">James Clear</h3>
                    <p class="pages">Pages: 807</p>
                    <label for="read-check-box">Read?
                        <input type="checkbox" class="read-check-box">
                    </label>
                    <button class="remove"></button>
                </div>
            </div>
            <div class="shelf">
                <div class="book">
                    <h2 class="title">Atomic Habits</h2>
                    <h3 class="author">James Clear</h3>
                    <p class="pages">Pages: 807</p>
                    <label for="read-check-box">Read?
                        <input type="checkbox" class="read-check-box">
                    </label>
                    <button class="remove"></button>
                </div>
            </div>
        </div>
        <dialog id="add-book-dialog">
            <form action="" method="dialog">
                <h1>Add a book to your collection</h1>
                <p>Please complete all required fields.</p>
                <fieldset>
                    <legend>Book Information</legend>
                    <label for="title">Book Title</label>
                    <input type="text" name="title" id="title">
                    <label for="authot">Book Author</label>
                    <input type="text" name="author" id="author">
                    <label for="pages">How many Pages?</label>
                    <input type="number" name="pages" id="pages">
                    <label for="read">Have you read the book?</label>
                    <input type="checkbox" name="read" id="read">
                </fieldset>
                <button type="submit" id="add">Add book to collection</button>
            </form>
        </dialog>

        <button type="button" id="new" command="show-modal" commandfor="add-book-dialog">New Book?</button>

    </main>


</body>

</html>
